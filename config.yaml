# ─────────────────────────────────────────────────────
#  Market Monitor — Configuration
# ─────────────────────────────────────────────────────

interval_minutes: 5
fetch_period: "2y"          # how much daily history to pull per symbol (needs ≥200d for SMA signals)

market_hours:
  timezone: "America/New_York"
  start: "09:30"
  end:   "16:00"
  run_outside_hours: false   # set true to run 24/7 (e.g. for crypto)

# Tickers to monitor
symbols:
  - AAPL
  - MSFT
  - SPY
  - QQQ

# ── Signal configuration ──────────────────────────────
signals:

  price_threshold:
    AAPL:
      above: 250.00    # fire if price rises above this
      below: 180.00    # fire if price falls below this
    SPY:
      above: 560.00
      below: 450.00

  volume_spike:
    multiplier: 2.5    # fire if volume > 2.5× the 20-day average

  golden_cross:
    symbols: [SPY]     # symbols to apply the 50/200-day SMA crossover check

  rsi_oversold:
    symbols: [SPY]    # tickers to evaluate
    period: 14        # RSI lookback in trading days (Wilder's smoothing)
    threshold: 30.0   # fire when RSI drops below this level

# ── Alert channels ─────────────────────────────────────
notifier:

  console:
    enabled: true

  email:
    enabled: true
    smtp_host: "smtp.gmail.com"   # override if not using Gmail
    smtp_port: 587
    to_addrs:                     # who receives the alerts
      - "jon8080@gmail.com"
    # Credentials live in .env, not here:
    #   GMAIL_ADDRESS=you@gmail.com
    #   GMAIL_APP_PASSWORD=xxxx xxxx xxxx xxxx

  slack:
    enabled: false
    webhook_url: ""
    channel: "#market-alerts"

# ── Future data-source API keys ────────────────────────
api_keys:
  alpha_vantage: ""
  polygon: ""
